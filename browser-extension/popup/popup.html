<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAS Safeguard</title>
  <link rel="stylesheet" href="popup.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-area">
        <!-- ZAS Safeguard Wordmark - Enterprise Brand -->
        <svg viewBox="0 0 180 30" fill="none" xmlns="http://www.w3.org/2000/svg" style="height: 24px; width: auto;"
          aria-label="ZAS Safeguard">
          <text x="0" y="22" fill="currentColor"
            style="font-family: Inter, system-ui, sans-serif; font-weight: 700; font-size: 24px; letter-spacing: -0.01em;">ZAS</text>
          <rect x="50" y="4" width="1.5" height="21" fill="currentColor" opacity="0.85" />
          <text x="60" y="21" fill="currentColor"
            style="font-family: Inter, system-ui, sans-serif; font-weight: 500; font-size: 14px; letter-spacing: 0.04em;">SAFEGUARD</text>
        </svg>
      </div>
      <button class="theme-btn" id="themeToggle">
        <span id="themeIcon">🌙</span>
      </button>
    </div>

    <!-- Status Card -->
    <div class="status-card">
      <div class="status-row">
        <span class="status-dot"></span>
        <span class="status-text">Protected</span>
        <span class="status-check">✓</span>
      </div>
      <p class="status-sub">All systems active</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-num" id="blockedToday">0</span>
        <span class="stat-label">Blocked Today</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="blockedTotal">0</span>
        <span class="stat-label">Total Blocked</span>
      </div>
    </div>

    <!-- Study Mode -->
    <div class="feature-row">
      <div class="feature-left">
        <span class="feature-icon"><i data-lucide="book-open"></i></span>
        <div class="feature-text">
          <span class="feature-title">Study Mode</span>
          <span class="feature-desc">Block all distractions</span>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="studyModeToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- User Info -->
    <div class="user-row" id="userSection" style="display: none;">
      <div class="user-avatar" id="userAvatarWrap">
        <img id="userAvatar" src="" alt="">
      </div>
      <div class="user-info">
        <span class="user-name" id="userName">User</span>
        <span class="user-plan" id="userPlan">Essential Plan</span>
      </div>
    </div>

    <!-- Login Button -->
    <div class="login-row" id="loginSection" style="display: none;">
      <button class="login-btn" id="loginBtn">Sign In to Sync</button>
    </div>

    <!-- Action Buttons -->
    <div class="actions-row">
      <button class="action-box" id="dashboardBtn">
        <span class="action-icon"><i data-lucide="layout-dashboard"></i></span>
        <span class="action-label">Dashboard</span>
      </button>
      <button class="action-box" id="syncBtn">
        <span class="action-icon"><i data-lucide="refresh-cw"></i></span>
        <span class="action-label">Sync Now</span>
      </button>
    </div>

    <!-- Quick Link Scan -->
    <div class="quick-scan-section">
      <div class="quick-scan-header">
        <span class="feature-icon"><i data-lucide="search"></i></span>
        <span class="feature-title">Quick Link Scan</span>
      </div>
      <div class="quick-scan-input">
        <input type="url" id="quickScanUrl" placeholder="Paste URL to scan..." />
        <button class="scan-btn" id="quickScanBtn">
          <span id="scanBtnText">Scan</span>
        </button>
      </div>
      <div class="quick-scan-result" id="quickScanResult" style="display: none;">
        <span class="scan-status-icon" id="scanResultIcon">✓</span>
        <span class="scan-status-text" id="scanResultText">Safe</span>
      </div>
    </div>

    <!-- Daily Quote -->
    <div class="quote-section" id="quoteSection">
      <span class="quote-icon"><i data-lucide="lightbulb"></i></span>
      <div class="quote-content">
        <p class="quote-text" id="popupQuoteText">"The only way to do great work is to love what you do."</p>
        <span class="quote-source" id="popupQuoteSource">— Motivational Quote</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-row">
      <span>Last sync: <span id="lastSync">Never</span></span>
      <span>v1.2.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
