<style>
:root{--bg-app:#0B0B0D;--bg-card:#1E1E22;--zas-indigo:#4C5EFF;--zas-indigo-subtle:rgba(76,94,255,0.08);--text-primary:#FFFFFF;--text-secondary:#B9BBC6;--text-muted:#6B6B76;--border-color:rgba(255,255,255,0.08);--emerald:#22C55E;--emerald-subtle:rgba(34,197,94,0.1);--crimson:#EF4444;--amber:#F59E0B;--radius-md:12px;--radius-lg:16px;--radius-full:9999px}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg-app);color:var(--text-primary);font-family:'Inter',-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(76,94,255,0.08) 0%,transparent 70%);pointer-events:none}
.logo-bar{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--text-primary);white-space:nowrap}
.logo-bar img{height:24px;width:auto;mix-blend-mode:screen;filter:brightness(1.05)}
.wrap{background:rgba(30,30,34,0.6);border:1px solid var(--border-color);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--radius-lg);padding:40px 36px;max-width:420px;width:100%;text-align:center;position:relative;z-index:1}
.shield-wrap{width:80px;height:80px;margin:0 auto 28px}
#blk-shield{width:100%;height:100%}
h1{font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:10px}
.subtitle{font-size:15px;color:var(--text-secondary);line-height:1.6;margin-bottom:24px}
.reason-card{background:rgba(255,255,255,0.04);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:14px 18px;margin-bottom:24px;text-align:left}
.reason-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.reason-value{font-size:15px;font-weight:500;color:var(--text-primary)}
.btns{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-md);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all 150ms ease;padding:10px 20px;border:none}
.btn-primary{background:var(--zas-indigo);color:#fff}
.btn-primary:hover{background:#3D4FE6}
.btn-secondary{background:transparent;color:var(--text-primary);border:1px solid var(--border-color)}
.btn-secondary:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12)}
.quote-box{background:rgba(255,255,255,0.03);border-left:2px solid rgba(76,94,255,0.4);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:24px;text-align:left}
.quote-text{font-size:14px;font-style:italic;color:var(--text-secondary);line-height:1.6}
.stats-row{display:flex;border-top:1px solid var(--border-color);padding-top:20px}
.stat{flex:1;text-align:center}
.stat:not(:last-child){border-right:1px solid var(--border-color)}
.stat-num{font-size:26px;font-weight:700;color:var(--zas-indigo);display:block;font-family:monospace}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:3px}
.page-footer{position:absolute;bottom:16px;font-size:12px;color:var(--text-muted)}
.page-footer a{color:rgba(76,94,255,0.8)}
@media(max-width:480px){.wrap{padding:28px 20px}.btns{flex-direction:column}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
<script>
(function(){
  const params=new URLSearchParams(location.search);
  const r=params.get('reason')||'adult';
  const map={adult:'Adult Content',malware:'Phishing / Malware',focus:'Focus Mode Active',lock:'Internet Lock',category:'Category Blocked'+(params.get('category')?' — '+params.get('category').charAt(0).toUpperCase()+params.get('category').slice(1):'')};
  document.getElementById('reason').textContent=map[r]||'Harmful Content';
  document.getElementById('goBackBtn').addEventListener('click',()=>{window.history.length>1?window.history.back():window.close();});
  const quotes=['Every time you resist, you become stronger.','Remember your goals. This feeling is temporary.','Your future self will thank you for this moment.','Think about why you set this protection up.','Strength is choosing what is better for you.'];
  document.getElementById('quoteText').textContent=quotes[Math.floor(Math.random()*quotes.length)];
  if(typeof chrome!=='undefined'&&chrome.storage){chrome.storage.local.get(['blocksToday','dayStreak'],s=>{if(s.blocksToday)document.getElementById('blocksToday').textContent=s.blocksToday;if(s.dayStreak)document.getElementById('daysStreak').textContent=s.dayStreak;});}
  window.addEventListener('load',()=>{
    if(!window.THREE)return;
    const canvas=document.getElementById('blk-shield');
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    renderer.setSize(80,80);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setClearColor(0,0);
    const scene=new THREE.Scene();
    const cam=new THREE.PerspectiveCamera(45,1,0.1,100);cam.position.z=4;
    const geo=new THREE.IcosahedronGeometry(1.4,1);
    const mesh=new THREE.LineSegments(new THREE.WireframeGeometry(geo),new THREE.LineBasicMaterial({color:0x4C5EFF,transparent:true,opacity:.8}));
    scene.add(mesh);
    scene.add(new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x4C5EFF,transparent:true,opacity:.04})));
    scene.add(new THREE.PointLight(0x4C5EFF,2,10));
    scene.add(new THREE.AmbientLight(0x1a1a3e,.5));
    (function loop(){requestAnimationFrame(loop);mesh.rotation.y+=.008;mesh.rotation.x=Math.sin(Date.now()*.0005)*.1;renderer.render(scene,cam);})();
  });
})();
</script>
